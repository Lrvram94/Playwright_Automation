name: Playwright Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger with advanced options
    inputs:
      test_file:
        description: 'Test file to run (or All Tests)'
        required: false
        type: choice
        default: 'All Tests'
        options:
          - 'All Tests'
          - 'SauceDemo.test.ts'
          - 'TradeMe.test.ts'
          - 'OrangeHrm.test.ts'
      
      browser:
        description: 'Browser to test on'
        required: true
        type: choice
        default: 'chromium'
        options:
          - 'chromium'
          - 'firefox'
          - 'webkit'
          - 'all'
      
      workers:
        description: 'Number of parallel workers'
        required: false
        type: choice
        default: '1'
        options:
          - '1'
          - '2'
          - '3'
          - '4'
      
      retries:
        description: 'Number of retries on failure'
        required: false
        type: choice
        default: '2'
        options:
          - '0'
          - '1'
          - '2'
          - '3'

jobs:
  test:
    name: Run Tests
    timeout-minutes: 30
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright browsers
      run: |
        if [ "${{ github.event.inputs.browser }}" == "all" ]; then
          npx playwright install --with-deps
        elif [ "${{ github.event.inputs.browser }}" == "webkit" ]; then
          npx playwright install --with-deps webkit
        elif [ "${{ github.event.inputs.browser }}" == "firefox" ]; then
          npx playwright install --with-deps firefox
        else
          npx playwright install --with-deps chromium
        fi
      
    - name: Run Playwright tests
      run: |
        # Build test command based on inputs
        TEST_CMD="npx playwright test"
        
        # Add specific test file if selected
        if [ "${{ github.event.inputs.test_file }}" != "All Tests" ] && [ -n "${{ github.event.inputs.test_file }}" ]; then
          TEST_CMD="$TEST_CMD ${{ github.event.inputs.test_file }}"
        fi
        
        # Add browser project
        if [ "${{ github.event.inputs.browser }}" != "all" ] && [ -n "${{ github.event.inputs.browser }}" ]; then
          TEST_CMD="$TEST_CMD --project=${{ github.event.inputs.browser }}"
        fi
        
        # Add workers (for manual runs only, auto-runs use default)
        if [ -n "${{ github.event.inputs.workers }}" ]; then
          TEST_CMD="$TEST_CMD --workers=${{ github.event.inputs.workers }}"
        fi
        
        # Add retries (for manual runs only)
        if [ -n "${{ github.event.inputs.retries }}" ]; then
          TEST_CMD="$TEST_CMD --retries=${{ github.event.inputs.retries }}"
        else
          # Default for automated runs
          TEST_CMD="$TEST_CMD --retries=2"
        fi
        
        echo "Running: $TEST_CMD"
        $TEST_CMD
      env:
        CI: true
        # URLs from GitHub Variables
        SAUCEDEMO_URL: ${{ vars.SAUCEDEMO_URL }}
        TRADEME_URL: ${{ vars.TRADEME_URL }}
        ORANGEHRM_URL: ${{ vars.ORANGEHRM_URL }}
        # Credentials from GitHub Secrets
        SAUCEDEMO_STANDARD_USERNAME: ${{ secrets.SAUCEDEMO_STANDARD_USERNAME }}
        SAUCEDEMO_STANDARD_PASSWORD: ${{ secrets.SAUCEDEMO_STANDARD_PASSWORD }}
        SAUCEDEMO_LOCKEDOUT_USERNAME: ${{ secrets.SAUCEDEMO_LOCKEDOUT_USERNAME }}
        SAUCEDEMO_LOCKEDOUT_PASSWORD: ${{ secrets.SAUCEDEMO_LOCKEDOUT_PASSWORD }}
        ORANGEHRM_ADMIN_USERNAME: ${{ secrets.ORANGEHRM_ADMIN_USERNAME }}
        ORANGEHRM_ADMIN_PASSWORD: ${{ secrets.ORANGEHRM_ADMIN_PASSWORD }}
        
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report-${{ github.event.inputs.browser || 'chromium' }}
        path: |
          playwright-report/
          test-results/
        retention-days: 7