name: PR Smoke Tests

on:
  pull_request:
    branches: [ main ]

jobs:
  smoke-tests:
    name: Quick Validation
    timeout-minutes: 15
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout PR branch
      uses: actions/checkout@v4
        
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright browsers
      run: npx playwright install --with-deps chromium
      
    - name: Run smoke tests
      run: npm run test:smoke || npm test  # Fallback if no smoke tests yet
      env:
        CI: true
        # URLs from GitHub Variables
        SAUCEDEMO_URL: ${{ vars.SAUCEDEMO_URL }}
        TRADEME_URL: ${{ vars.TRADEME_URL }}
        ORANGEHRM_URL: ${{ vars.ORANGEHRM_URL }}
        # Credentials from GitHub Secrets
        SAUCEDEMO_STANDARD_USERNAME: ${{ secrets.SAUCEDEMO_STANDARD_USERNAME }}
        SAUCEDEMO_STANDARD_PASSWORD: ${{ secrets.SAUCEDEMO_STANDARD_PASSWORD }}
        SAUCEDEMO_LOCKEDOUT_USERNAME: ${{ secrets.SAUCEDEMO_LOCKEDOUT_USERNAME }}
        SAUCEDEMO_LOCKEDOUT_PASSWORD: ${{ secrets.SAUCEDEMO_LOCKEDOUT_PASSWORD }}
        ORANGEHRM_ADMIN_USERNAME: ${{ secrets.ORANGEHRM_ADMIN_USERNAME }}
        ORANGEHRM_ADMIN_PASSWORD: ${{ secrets.ORANGEHRM_ADMIN_PASSWORD }}